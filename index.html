<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reco — your recovery companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:   #f5ede0;
      --cream2:  #ede0cd;
      --cream3:  #e2d2bc;
      --ink:     #3d2f24;
      --inkSoft: #6b5849;
      --inkFaint:#9a8775;
      --ember:   #a64d2e;
      --sage:    #7a9270;
      --amber:   #c89860;
      --serif: 'Newsreader', Georgia, 'Times New Roman', serif;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --ambient: linear-gradient(180deg, #f9f1e3 0%, #f0e3cb 100%);
      --ambientDeep: linear-gradient(180deg, #ede0cd 0%, #e0cfb3 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: var(--serif);
      background: #d9c9ae;
      color: var(--ink);
      overflow: hidden;
    }

    #app-frame {
      max-width: 440px;
      margin: 0 auto;
      height: 100vh;
      height: 100dvh;
      position: relative;
      background: var(--ambient);
      overflow: hidden;
      box-shadow: 0 0 60px rgba(61,47,36,0.18);
    }

    .screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }

    button { font-family: var(--serif); cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea { font-family: var(--serif); outline: none; }
    input:focus, textarea:focus, button:focus { outline: none; }

    .btn-primary {
      width: 100%; padding: 18px; border-radius: 100px;
      background: var(--ember); color: white; font-size: 16px;
      letter-spacing: 0.5px; box-shadow: 0 4px 16px rgba(166,77,46,0.25);
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--cream3); color: var(--inkFaint); box-shadow: none; cursor: not-allowed; }

    .btn-outline {
      width: 100%; padding: 18px; border-radius: 100px;
      border: 1.5px solid var(--cream3); background: transparent;
      color: var(--ink); font-size: 14px; letter-spacing: 0.3px;
    }

    .input-field {
      width: 100%; padding: 18px 22px;
      background: var(--cream); border: 1.5px solid var(--cream3);
      border-radius: 100px; font-size: 15px; color: var(--ink);
    }
    .input-soft {
      width: 100%; padding: 20px 22px;
      background: var(--cream); border: 1.5px solid var(--cream3);
      border-radius: 20px; font-size: 17px; color: var(--ink);
      line-height: 1.6; resize: none;
    }

    .label-caps {
      font-size: 11px; color: var(--inkFaint); letter-spacing: 2px;
      text-transform: uppercase; font-family: var(--sans);
    }

    .soft-header {
      padding: 16px 20px; display: flex; justify-content: flex-end;
      font-family: var(--sans); flex-shrink: 0;
    }
    .soft-header button { color: var(--inkSoft); font-size: 13px; letter-spacing: 0.3px; padding: 8px 12px; font-family: var(--sans); }

    @keyframes breathe {
      0%, 100% { transform: scale(0.85); opacity: 0.7; }
      40%, 60% { transform: scale(1.15); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(166,77,46,0); }
      50%      { box-shadow: 0 0 0 12px rgba(166,77,46,0.08); }
    }
    @keyframes morphFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
      33%      { transform: translateY(-10px) rotate(2deg) scale(1.02); }
      66%      { transform: translateY(-4px) rotate(-1deg) scale(0.98); }
    }
    @keyframes morphShape {
      0%, 100% { border-radius: var(--r1) var(--r2) var(--r3) var(--r4) / var(--r4) var(--r1) var(--r2) var(--r3); }
      25%      { border-radius: var(--r2) var(--r3) var(--r4) var(--r1) / var(--r3) var(--r4) var(--r1) var(--r2); }
      50%      { border-radius: var(--r3) var(--r4) var(--r1) var(--r2) / var(--r2) var(--r3) var(--r4) var(--r1); }
      75%      { border-radius: var(--r4) var(--r1) var(--r2) var(--r3) / var(--r1) var(--r2) var(--r3) var(--r4); }
    }
    .fade-up { animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both; }
    .fade-in { animation: fadeIn 0.6s ease both; }
    .breathing-circle { animation: breathe 10s ease-in-out infinite; }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--ember); cursor: pointer;
      box-shadow: 0 2px 6px rgba(166,77,46,0.35);
    }
    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--ember); cursor: pointer; border: none;
      box-shadow: 0 2px 6px rgba(166,77,46,0.35);
    }

    #breathe-fab {
      position: absolute; bottom: 24px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--cream);
      box-shadow: 0 4px 20px rgba(61,47,36,0.12);
      z-index: 50; display: flex; align-items: center; justify-content: center;
    }
    #breathe-fab .dot {
      width: 24px; height: 24px; border-radius: 50%;
      background: radial-gradient(circle, var(--ember) 0%, #a64d2ecc 100%);
      animation: breathe 6s ease-in-out infinite;
    }

    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 0; background: transparent; }
  </style>
</head>
<body>
  <div id="app-frame">
    <div id="root"></div>
    <button id="breathe-fab" class="hidden" aria-label="breathe"><span class="dot"></span></button>
  </div>
  <script src="reco.js"></script>
</body>
</html>
